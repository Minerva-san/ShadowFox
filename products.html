<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJIO UX</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-light shadow fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">AJIO UX</a>
        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse"
            id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#">Women</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Men</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Kids</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Footwear</a>
                </li>
            </ul>
            <div class="position-relative me-3">

                <input
                    id="search-products"
                    class="form-control"
                    type="search"
                    placeholder="Search products">

                <div id="search-suggestions"
                    class="list-group position-absolute w-100 shadow"
                    style="z-index:1050; display:none; max-height:250px; overflow-y:auto;">
                </div>

            </div>
            <div class="d-flex align-items-center">
            <a href="wishlist.html" class="me-3 text-dark">
                <div class="position-relative me-3">
                    <i class="bi bi-heart fs-4"></i>
                    <span
                        id="wishlist-count"
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        0
                    </span>
                </div>
            </a>
            <div class="position-relative me-3" id="cart-container">
                <a href="#" class="text-dark" id="cart-icon">
                    <i class="bi bi-cart3 fs-4"></i>
                </a>
                <span
                    id="cart-count"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    0
                </span>
                <div id="cart-preview">
                    <h6 class="fw-bold mb-3">
                        My Cart
                    </h6>
                    <div id="cart-items">
                        <p class="text-muted">
                            Your cart is empty.
                        </p>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <strong>Total</strong>
                        <strong>
                            ₹<span id="cart-total">0</span>
                        </strong>
                    </div>
                    <a href="checkout.html" class="btn btn-dark w-100 mt-3">
                        View Cart
                    </a>
                </div>
            </div>
            <div class="dropdown ms-3">
                <a
                    href="#"
                    class="text-dark text-decoration-none"
                    data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle fs-4"></i>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-person me-2"></i>
                            My Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-bag me-2"></i>
                            My Orders
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-gear me-2"></i>
                            Settings
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item text-danger" href="#">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>
            </div>
        </div>
    </div>
    </nav>

    <section class="container mt-5 pt-5">
        <!-- Breadcrumb -->
        <nav class="mt-4 mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a href="index.html" class="text-decoration-none">Home</a>
                </li>
                <li class="breadcrumb-item active">
                    Products
                </li>
            </ol>
        </nav>
        
        <div class="row">
            <!-- Filters -->
            <div class="col-lg-3">
                <div class="card shadow-sm p-3 sticky-top" style="top:90px;">
                    <h5 class="mb-4">Filters</h5>
                    <!-- Category -->
                    <div class="mb-4">
                        <h6>Category</h6>
                        <div class="form-check">
                            <input class="form-check-input category-filter" type="checkbox" value="Men">
                            <label class="form-check-label">Men</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input category-filter" type="checkbox" value="Women">
                            <label class="form-check-label">Women</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input category-filter" type="checkbox" value="Kids">
                            <label class="form-check-label">Kids</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input category-filter" type="checkbox" value="Accessories">
                            <label class="form-check-label">Accessories</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input category-filter" type="checkbox" value="Footwear">
                            <label class="form-check-label">Footwear</label>
                        </div>
                    </div>
                    <!-- Price -->
                    <div class="mb-4">
                        <h6>Price</h6>
                        <select class="form-select" id="price-filter">
                            <option value="">All</option>
                            <option value="500">Under ₹500</option>
                            <option value="1500">₹500 - ₹1500</option>
                            <option value="1501">Above ₹1500</option>
                        </select>
                    </div>
                    <!-- Rating -->
                    <div class="mb-4">
                        <h6>Minimum Rating</h6>
                        <select class="form-select" id="rating-filter">
                            <option value="">All</option>
                            <option value="4">4★ & above</option>
                            <option value="4.5">4.5★ & above</option>
                        </select>
                    </div>
                </div>
            </div>
            <!-- Products -->
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4>
                        <span id="product-count">10</span>
                        Products
                    </h4>
                    <select class="form-select w-auto" id="sort-products">
                        <option value="">Sort By</option>
                        <option value="popular">Most Popular</option>
                        <option value="trending">Trending</option>
                        <option value="bestseller">Best Seller</option>
                        <option value="low">Price: Low → High</option>
                        <option value="high">Price: High → Low</option>
                        <option value="rating">Highest Rated</option>
                        <option value="discount">Highest Discount</option>
                        <option value="newest">Newest</option>
                    </select>
                </div>
                <div class="row g-4" id="products-grid">
                    <!-- Product cards will be inserted here -->
                </div>
            </div>
        </div>
    </section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/product.js"></script>
</body>
</html>
