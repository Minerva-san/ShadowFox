<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AJIO UX</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-light shadow fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">AJIO UX</a>
        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse"
            id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#">Women</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Men</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Kids</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Footwear</a>
                </li>
            </ul>
            <form class="d-flex me-3">
                <input
                    class="form-control"
                    type="search"
                    placeholder="Search products">
            </form>
            <div class="d-flex align-items-center">
            <a href="wishlist.html" class="me-3 text-dark">
                <div class="position-relative me-3">
                    <i class="bi bi-heart fs-4"></i>
                    <span
                        id="wishlist-count"
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        0
                    </span>
                </div>
            </a>
            <div class="position-relative me-3" id="cart-container">
                <a href="#" class="text-dark" id="cart-icon">
                    <i class="bi bi-cart3 fs-4"></i>
                </a>
                <span
                    id="cart-count"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    0
                </span>
                <div id="cart-preview">
                    <h6 class="fw-bold mb-3">
                        My Cart
                    </h6>
                    <div id="cart-items">
                        <p class="text-muted">
                            Your cart is empty.
                        </p>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <strong>Total</strong>
                        <strong>
                            ₹<span id="cart-total">0</span>
                        </strong>
                    </div>
                    <a href="checkout.html" class="btn btn-dark w-100 mt-3">
                        View Cart
                    </a>
                </div>
            </div>
            <div class="dropdown ms-3">
                <a
                    href="#"
                    class="text-dark text-decoration-none"
                    data-bs-toggle="dropdown">
                    <i class="bi bi-person-circle fs-4"></i>
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-person me-2"></i>
                            My Profile
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-bag me-2"></i>
                            My Orders
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-gear me-2"></i>
                            Settings
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item text-danger" href="#">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Logout
                        </a>
                    </li>
                </ul>
            </div>
            </div>
        </div>
    </div>
    </nav>
    <section class="container mt-5 pt-5">
        <div class="d-flex justify-content-center align-items-center gap-3 mb-5 fs-5 fw-semibold">
            <span class="text-success">
                <i class="bi bi-check-circle-fill"></i> Cart
            </span>
            <i class="bi bi-arrow-right"></i>
            <span style="color:#7c5f24;">
                <i class="bi bi-credit-card-fill"></i> Checkout
            </span>
            <i class="bi bi-arrow-right"></i>
            <span class="text-secondary">
                <i class="bi bi-bag-check"></i> Done
            </span>
        </div>
    </section>
    <section class="container mb-5">
        <div class="row">
        <div class="col-lg-7">
        <!-- Address Card -->
         <div class="card shadow-sm mb-4">
            <div class="card-body">
            <h4 class="mb-4">Delivery Address</h4>
                <div class="row">
                <div class="col-md-6 mb-3">
                <input class="form-control"placeholder="Full Name">
                </div>
                <div class="col-md-6 mb-3">
                <input class="form-control"placeholder="Phone Number">
                </div>
                <div class="col-12 mb-3">
                <input class="form-control" placeholder="Email">
                </div>
                <div class="col-12 mb-3">
                <textarea class="form-control" rows="3" placeholder="Address"></textarea>
                </div>
                <div class="col-md-4">
                <input class="form-control" placeholder="City">
                </div>
                <div class="col-md-4">
                <input class="form-control" placeholder="State">
                </div>
                <div class="col-md-4">
                <input class="form-control"placeholder="PIN">
                </div>
                </div>
            </div>
            </div>
            <div class="card shadow-sm">
            <div class="card-body">
            <h4 class="mb-4">
            Payment Method
            </h4>
            <div class="form-check mb-3">
            <input
            class="form-check-input"
            type="radio"
            name="payment"
            checked>
            <label class="form-check-label">
            UPI
            </label>
            </div>
            <div class="form-check mb-3">
            <input
            class="form-check-input"
            type="radio"
            name="payment">
            <label class="form-check-label">
            Debit / Credit Card
            </label>
            </div>
            <div class="form-check">
            <input
            class="form-check-input"
            type="radio"
            name="payment">
            <label class="form-check-label">
            Cash On Delivery
            </label>
            </div>
            </div>
            </div>
                    </div>
                    <div class="col-lg-5">
                    <!-- Order Summary -->
                    <div class="card shadow-sm sticky-top" style="top:100px;">
            <div class="card-body">
            <h4 class="mb-4">
            Order Summary
            </h4>
            <div id="checkout-items">
            </div>
            <hr>
            <div class="d-flex justify-content-between">
            <span>Subtotal</span>
            <strong id="subtotal"></strong>
            </div>
            <div class="d-flex justify-content-between mt-2">
            <span>Platform Fee</span>
            <strong>₹20</strong>
            </div>
            <div class="d-flex justify-content-between mt-2">
            <span>Delivery</span>
            <strong class="text-success">
            FREE
            </strong>
            </div>
            <hr>
            <div class="d-flex justify-content-between">
            <h5>Total</h5>
            <h5 id="grand-total"></h5>
            </div>
            <p class="text-success mt-3">
            <i class="bi bi-truck"></i>
            Expected Delivery
            <strong>
            8–10 July
            </strong>
            </p>
            <button
            id="place-order"
            class="btn cart-btn w-100 mt-3">
            Place Order
            </button>
            </div>
            </div>
        </div>
        </div>
        </section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script src="js/checkout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
